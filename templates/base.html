<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NutriMatch{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#16a34a',
            secondary: '#f59e0b',
            dark: '#0f172a',
            soft: '#f8fafc'
          },
          boxShadow: {
            glow: '0 20px 45px rgba(22,163,74,0.18)'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800">

  <header class="sticky top-0 z-50 backdrop-blur bg-white/80 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-primary text-white flex items-center justify-center font-bold text-lg">N</div>
        <div>
          <p class="font-bold text-lg">NutriMatch</p>
          <p class="text-xs text-slate-500">Repas personnalisés et sécurisés</p>
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
        <a href="#fonctionnement" class="hover:text-primary">Fonctionnement</a>
        <a href="#avantages" class="hover:text-primary">Avantages</a>
        <a href="#securite" class="hover:text-primary">Sécurité</a>
        <a href="#contact" class="hover:text-primary">Contact</a>
      </nav>

      <div class="flex items-center gap-3">
        <button class="hidden md:inline-flex px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100">
          Connexion
        </button>
        <button class="px-4 py-2 rounded-xl bg-primary text-white hover:bg-green-700 shadow-glow">
          Commencer
        </button>
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer id="contact" class="border-t border-slate-200 bg-white">
    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between gap-4 text-sm text-slate-500">
      <p>© 2026 NutriMatch — Projet académique en sécurité logicielle</p>
      <div class="flex gap-6">
        <a href="#" class="hover:text-primary">Mentions</a>
        <a href="#" class="hover:text-primary">Confidentialité</a>
        <a href="#" class="hover:text-primary">Contact</a>
      </div>
    </div>
  </footer>

</body>
</html>
